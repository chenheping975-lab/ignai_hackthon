components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: integer
    RegistrationId:
      name: registrationId
      in: path
      required: true
      schema:
        type: integer
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        errorCode:
          type: string
          nullable: true
        message:
          type: string
        data:
          type: object
          nullable: true
    RegisterRequest:
      type: object
      required:
      - name
      - phone
      - password
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string
    LoginRequest:
      type: object
      required:
      - account
      - password
      properties:
        account:
          type: string
        password:
          type: string
    LoginResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
    UserResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
    RootBootstrapRequest:
      type: object
      required:
      - ownerEmail
      - password
      properties:
        ownerEmail:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          default: IGNAI Root
    PasswordChangeRequest:
      type: object
      required:
      - oldPassword
      - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
    OwnerEmailChangeRequest:
      type: object
      required:
      - password
      - ownerEmail
      properties:
        password:
          type: string
        ownerEmail:
          type: string
          format: email
    AdminCreateRequest:
      type: object
      required:
      - name
      - email
      - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8
    EventResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
    EventUpsertRequest:
      type: object
      required:
      - title
      properties:
        title:
          type: string
        subtitle:
          type: string
        location:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - draft
          - published
          - running
          - archived
        officialSiteUrl:
          type: string
        benchmarkSiteUrl:
          type: string
    EventWindowRequest:
      type: object
      properties:
        registrationOpen:
          type: boolean
        ratingEnabled:
          type: boolean
        voteEnabled:
          type: boolean
        registrationDeadline:
          type: string
          format: date-time
        submissionDeadline:
          type: string
          format: date-time
        ratingStartAt:
          type: string
          format: date-time
        ratingEndAt:
          type: string
          format: date-time
    TrackCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
    FormFieldSaveRequest:
      type: object
      required:
      - targetType
      - fields
      properties:
        targetType:
          type: string
          enum:
          - registration
          - project
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
    FormField:
      type: object
      required:
      - fieldKey
      - label
      - fieldType
      properties:
        fieldKey:
          type: string
        label:
          type: string
        fieldType:
          type: string
          enum:
          - text
          - textarea
          - radio
          - checkbox
          - select
          - date
          - file
          - url
        required:
          type: boolean
        options:
          type: array
          items:
            type: string
        placeholder:
          type: string
        sortOrder:
          type: integer
        enabled:
          type: boolean
    RegistrationCreateRequest:
      type: object
      required:
      - registrationType
      - contactName
      - contactPhone
      properties:
        registrationType:
          type: string
          enum:
          - individual
          - team
        teamName:
          type: string
        contactName:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: string
        trackId:
          type: integer
        members:
          type: array
          items:
            type: object
        payload:
          type: object
    RegistrationReviewRequest:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - approved
          - rejected
          - waitlist
        note:
          type: string
        generateMailDraft:
          type: boolean
    MailTemplateRequest:
      type: object
      required:
      - eventId
      - scene
      - name
      - subjectTemplate
      - bodyTemplate
      properties:
        eventId:
          type: integer
        scene:
          type: string
          enum:
          - approved
          - rejected
          - waitlist
          - reminder
          - custom
        name:
          type: string
        subjectTemplate:
          type: string
        bodyTemplate:
          type: string
        enabled:
          type: boolean
    MailSendRequest:
      type: object
      required:
      - recipientEmail
      - subject
      - body
      properties:
        eventId:
          type: integer
        templateId:
          type: integer
        targetType:
          type: string
          enum:
          - registration
          - team
          - project
          - custom
        targetId:
          type: integer
        recipientEmail:
          type: string
          format: email
        subject:
          type: string
        body:
          type: string
    ProjectUpsertRequest:
      type: object
      required:
      - eventId
      - teamId
      - title
      properties:
        eventId:
          type: integer
        teamId:
          type: integer
        trackId:
          type: integer
        title:
          type: string
        tagline:
          type: string
        description:
          type: string
        demoUrl:
          type: string
        codeUrl:
          type: string
        payload:
          type: object
    ProjectShowcaseRequest:
      type: object
      properties:
        published:
          type: boolean
        featured:
          type: boolean
        sortWeight:
          type: integer
        showcaseNote:
          type: string
    RatingCreateRequest:
      type: object
      required:
      - score
      - raterKey
      properties:
        score:
          type: number
          minimum: 1
          maximum: 5
        raterKey:
          type: string
        sourceType:
          type: string
          enum:
          - public
          - participant
          - onsite_code
    FeishuSyncRequest:
      type: object
      required:
      - targetType
      - targetIds
      - syncType
      properties:
        targetType:
          type: string
          enum:
          - registration
          - team
          - project
          - project_file
          - mail_log
        targetIds:
          type: array
          items:
            type: integer
        syncType:
          type: string
          enum:
          - base
          - drive
          - board
          - export
