<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>活动列表 — IGNAI AI Skillathon</title>
    <link rel="icon" href="./assets/img/ignai-torch.png" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("ignai-theme");
          var system =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          var theme = stored || system;
          var root = document.documentElement;
          root.classList.remove("dark", "light");
          root.classList.add(theme);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="IGNAI AI Skillathon">
        <img src="./assets/img/ignai-logo-horizontal.webp" alt="IGNAI" />
      </a>
      <nav class="nav-links" aria-label="主导航">
        <a href="./index.html#why">为什么</a>
        <a href="./index.html#action">行动</a>
        <a href="./index.html#journey">流程</a>
        <a href="./index.html#showcase">作品</a>
        <a href="./events.html">活动</a>
        <a href="https://www.ignai.cn/" target="_blank" rel="noreferrer">官网</a>
      </nav>
      <div class="header-actions">
        <a class="header-cta header-join" href="./index.html#apply">加入黑客松</a>
      </div>
    </header>

    <main style="max-width:1100px;margin:0 auto;padding:120px 24px 80px">
      <section>
        <p class="eyebrow">ALL EVENTS</p>
        <h1 style="font-size:2.5rem;margin-bottom:1rem">全部活动</h1>
        <p style="color:var(--text-secondary);margin-bottom:3rem">浏览 IGNAI 往期与即将举办的黑客松活动。</p>

        <div id="events-grid" class="project-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem">
          <!-- JS 动态填充 -->
        </div>

        <div id="events-loading" style="text-align:center;padding:3rem;color:var(--text-secondary)">加载中…</div>
        <div id="events-empty" style="display:none;text-align:center;padding:3rem;color:var(--text-secondary)">暂无活动，敬请期待。</div>

        <nav id="events-pager" style="display:flex;justify-content:center;gap:0.5rem;margin-top:2rem"></nav>
      </section>
    </main>

    <script src="./assets/js/api.js"></script>
    <script>
      const ENABLE_PUBLIC_API =
        window.IGNAI_ENABLE_PUBLIC_API !== false &&
        localStorage.getItem("ignai_enable_public_api") !== "0";

      async function loadEvents(page) {
        var grid = document.getElementById("events-grid");
        var loading = document.getElementById("events-loading");
        var empty = document.getElementById("events-empty");
        var pager = document.getElementById("events-pager");

        if (!ENABLE_PUBLIC_API) {
          loading.style.display = "none";
          empty.style.display = "block";
          empty.textContent = "后端 API 未启用，请在 localStorage 设置 ignai_enable_public_api=1";
          return;
        }

        loading.style.display = "block";
        empty.style.display = "none";
        grid.innerHTML = "";

        try {
          var resp = await fetch("/api/public/events?page=" + page + "&pageSize=6");
          var json = await resp.json();
          if (!json.success || !json.data || !json.data.list || !json.data.list.length) {
            loading.style.display = "none";
            empty.style.display = "block";
            return;
          }

          var data = json.data;
          loading.style.display = "none";

          data.list.forEach(function (event) {
            var card = document.createElement("article");
            card.className = "project-card";
            card.style.cursor = "pointer";
            card.addEventListener("click", function () {
              window.location.href = "./index.html?eventId=" + event.id;
            });

            var deadline = event.registrationDeadline
              ? new Date(event.registrationDeadline).toLocaleDateString("zh-CN")
              : "待定";

            card.innerHTML =
              '<div>' +
              '<span>' + (event.registrationOpen ? "开放报名" : "报名关闭") + "</span>" +
              '<h3 style="font-size:1.25rem;margin:0.5rem 0">' + escapeHtml(event.title) + "</h3>" +
              '<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.5rem">' + escapeHtml(event.description || "") + "</p>" +
              "<footer>" +
              "<strong>" + escapeHtml(event.location || "") + "</strong>" +
              "<small>截止 " + deadline + "</small>" +
              "</footer>" +
              "</div>";

            grid.appendChild(card);
          });

          // 分页
          pager.innerHTML = "";
          var totalPages = Math.ceil(data.total / data.pageSize) || 1;
          for (var i = 1; i <= totalPages; i++) {
            var btn = document.createElement("button");
            btn.textContent = i;
            btn.style.cssText =
              "min-width:2.2rem;padding:0.4rem 0.8rem;border:1px solid var(--border);border-radius:6px;background:" +
              (i === data.page ? "var(--accent)" : "transparent") +
              ";color:" +
              (i === data.page ? "#fff" : "var(--text-primary)") +
              ";cursor:pointer";
            btn.addEventListener("click", function () {
              loadEvents(this.textContent);
            });
            pager.appendChild(btn);
          }
        } catch (e) {
          loading.style.display = "none";
          empty.style.display = "block";
          empty.textContent = "加载失败：" + e.message;
        }
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadEvents(1);
      });
    </script>
  </body>
</html>
