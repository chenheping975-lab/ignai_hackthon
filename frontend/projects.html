<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IGNAI AI Skillathon · 作品平台</title>
    <meta name="description" content="IGNAI AI Skillathon 单场黑客松作品展示、赛道筛选与点赞平台。" />
    <link rel="icon" href="./assets/img/ignai-torch.png" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("ignai-theme");
          var system =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          var theme = stored || system;
          var root = document.documentElement;
          root.classList.remove("dark", "light");
          root.classList.add(theme);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="projects">
    <header class="site-header compact-header">
      <a class="brand" href="./index.html#events" aria-label="返回 IGNAI 活动首页">
        <img src="./assets/img/ignai-logo-horizontal.webp" alt="IGNAI" />
      </a>
      <nav class="nav-links" aria-label="作品平台导航">
        <a href="./index.html#events">活动</a>
        <a id="projects-event-nav" href="./event.html?id=ignai-ai-skillathon">赛事详情</a>
        <a href="#project-list">作品</a>
        <a href="https://www.ignai.cn/" target="_blank" rel="noreferrer">官网</a>
      </nav>
      <div class="header-actions">
        <a class="outline-button" href="./index.html">首页</a>
        <a class="header-cta" id="projects-event-header-link" href="./event.html?id=ignai-ai-skillathon">返回赛事</a>
      </div>
    </header>

    <main id="project-platform-root">
      <section class="hero project-page-hero">
        <div class="hero-gradient" aria-hidden="true"></div>
        <div class="hero-inner">
          <div class="hero-copy">
            <p class="eyebrow" data-reveal>PROJECT SHOWCASE</p>
            <h1 data-reveal data-reveal-delay="1" id="projects-title">这场黑客松的作品平台</h1>
            <p class="hero-lead" data-reveal data-reveal-delay="2" id="projects-summary">
              作品按赛道、票数和最新排序展示，注册用户可以点赞。MVP 不引入视频上传。
            </p>
          </div>
          <aside class="gallery-snapshot hero-gallery" data-reveal data-reveal-delay="2">
            <img src="./assets/img/collaboration-threads.png" alt="IGNAI 作品协作视觉" />
            <div>
              <span>GALLERY</span>
              <strong id="projects-count-label">0 个作品</strong>
              <p>项目资料包含 PPT、HTML、MP3、图片、文档和链接。</p>
            </div>
          </aside>
        </div>
      </section>

      <section class="project-platform" id="project-list">
        <div class="project-toolbar">
          <div>
            <p class="eyebrow">FILTER</p>
            <h2 id="project-toolbar-title">作品列表</h2>
          </div>
          <div class="project-controls">
            <div class="segmented" id="project-track-filters" aria-label="赛道筛选"></div>
            <label class="sort-control">排序
              <select id="project-sort-select">
                <option value="featured">精选优先</option>
                <option value="votes">票数最高</option>
                <option value="latest">最新提交</option>
              </select>
            </label>
          </div>
        </div>
        <div class="project-gallery" id="project-gallery" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>IGNAI AI Skillathon</span>
      <a href="./index.html#events">活动首页</a>
      <a id="projects-footer-event-link" href="./event.html?id=ignai-ai-skillathon">赛事详情</a>
      <a href="./root/">后台管理 MVP</a>
    </footer>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/event-chain.js"></script>
  </body>
</html>
